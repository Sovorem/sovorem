name: Run tests

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v6
        with:
          persist-credentials: false

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - name: Check formatting (gofmt)
        run: |
          unformatted=$(gofmt -l .)
          if [ -n "$unformatted" ]; then
            echo "These files are not gofmt-formatted. Run 'gofmt -w .' and commit:"
            echo "$unformatted"
            exit 1
          fi

      - name: Vet
        run: go vet ./...

      - name: Check generated code is up to date
        run: |
          go generate ./...
          if ! git diff --quiet; then
            echo "Generated code is stale. Edit the spec and run 'go generate ./...', then commit:"
            git --no-pager diff --stat
            exit 1
          fi

      - run: go test ./...
